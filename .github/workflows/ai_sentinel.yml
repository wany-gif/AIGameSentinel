name: AI Game Sentinel Run

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각 실행
  workflow_dispatch: # 수동 실행 버튼 활성화

permissions:
  contents: write # 봇이 news_db.json을 커밋하고 푸시할 수 있도록 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade google-generativeai # 최신 버전으로 강제 업데이트
          pip install feedparser requests

      - name: Run Crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_GENERAL: ${{ secrets.SLACK_WEBHOOK_URL_GENERAL }}
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_db.json
          git commit -m "Update news database [skip ci]" || exit 0
          git push
